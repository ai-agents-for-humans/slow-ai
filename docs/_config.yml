title: Slow AI
description: Systems that learn. Agents that work. Humans who stay in control.
baseurl: "/slow-ai"
url: "https://ai-agents-for-humans.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

aux_links:
  "GitHub":
    - "https://github.com/ai-agents-for-humans/slow-ai"

aux_links_new_tab: true

nav_sort: order

footer_content: >
  <span style="opacity: 0.6;">
  Systems that learn. Agents that work. Humans who stay in control.
  </span>

back_to_top: true
back_to_top_text: "Back to top"

heading_anchors: true

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme
