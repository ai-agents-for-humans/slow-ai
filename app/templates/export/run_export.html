<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ goal }}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.75;
    color: #1a1a2e;
    background: #fff;
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  /* Header */
  .report-header {
    border-bottom: 2px solid #1a1a2e;
    padding-bottom: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .report-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 0.5rem;
  }
  .report-title {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    color: #1a1a2e;
    margin-bottom: 0.75rem;
  }
  .report-meta {
    font-size: 0.8rem;
    color: #6b7280;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  /* Body content */
  .report-body h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 2rem 0 0.75rem;
    color: #1a1a2e;
    line-height: 1.3;
  }
  .report-body h2 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 2rem 0 0.6rem;
    color: #1a1a2e;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid #e5e7eb;
  }
  .report-body h3 {
    font-size: 1rem;
    font-weight: 600;
    margin: 1.5rem 0 0.4rem;
    color: #374151;
  }
  .report-body p {
    margin-bottom: 1rem;
    color: #374151;
  }
  .report-body ul, .report-body ol {
    margin: 0.5rem 0 1rem 1.5rem;
    color: #374151;
  }
  .report-body li { margin-bottom: 0.3rem; }
  .report-body strong { color: #1a1a2e; }
  .report-body em { color: #4b5563; }
  .report-body blockquote {
    border-left: 3px solid #d1d5db;
    padding-left: 1rem;
    color: #6b7280;
    margin: 1rem 0;
    font-style: italic;
  }
  .report-body code {
    background: #f3f4f6;
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-size: 0.875em;
    font-family: "SF Mono", "Fira Code", Consolas, monospace;
  }
  .report-body pre {
    background: #f3f4f6;
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    margin: 1rem 0;
  }
  .report-body pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }
  .report-body a { color: #3b82f6; text-decoration: none; }
  .report-body a:hover { text-decoration: underline; }
  .report-body hr {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 2rem 0;
  }
  .report-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.9rem;
  }
  .report-body th, .report-body td {
    border: 1px solid #e5e7eb;
    padding: 0.5rem 0.75rem;
    text-align: left;
  }
  .report-body th { background: #f9fafb; font-weight: 600; }

  /* Footer */
  .report-footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e5e7eb;
    font-size: 0.75rem;
    color: #9ca3af;
    display: flex;
    justify-content: space-between;
  }

  @media print {
    body { padding: 1.5rem; font-size: 14px; }
    .report-header { border-bottom-width: 1px; }
    a { color: inherit; }
  }
</style>
</head>
<body>

<header class="report-header">
  <div class="report-label">Research Report · Slow AI</div>
  <div class="report-title">{{ goal }}</div>
  <div class="report-meta">
    {% if domain %}<span>{{ domain }}</span>{% endif %}
    <span>{{ run_date }}</span>
    <span>Run {{ run_id[:8] }}</span>
  </div>
</header>

<main class="report-body">
  {{ rendered_body | safe }}
</main>

<footer class="report-footer">
  <span>Generated by Slow AI · agentic research orchestration</span>
  <span>{{ run_id }}</span>
</footer>

</body>
</html>
