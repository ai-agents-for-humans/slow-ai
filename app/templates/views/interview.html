{% extends "base.html" %}

{% block title %}New Investigation · Slow AI{% endblock %}

{% block content %}
<div class="d-flex flex-column" style="height:100vh;">

  <!-- Header -->
  <div class="border-bottom bg-white px-4 py-3 d-flex align-items-center gap-3">
    <a href="/" class="text-muted text-decoration-none" style="font-size:0.85rem;">
      ← Back
    </a>
    <span class="fw-semibold" style="font-size:0.95rem;">New Investigation</span>
  </div>

  <!-- Chat messages -->
  <div class="flex-grow-1 overflow-auto px-4 py-4" id="chat-scroll">
    <div style="max-width:720px; margin:0 auto;">

      <div id="chat-messages"
           hx-post="/api/interview/start"
           hx-trigger="load"
           hx-swap="beforeend"
           hx-indicator="#typing">
      </div>

      <!-- Typing indicator -->
      <div id="typing" class="d-flex mb-3 htmx-indicator">
        <div class="chat-bubble-agent d-flex align-items-center gap-1" style="padding:14px 18px;">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>

    </div>
  </div>

  <!-- Input -->
  <div class="border-top bg-white px-4 py-3">
    <div style="max-width:720px; margin:0 auto;">
      <form id="chat-form"
            hx-post="/api/interview/message"
            hx-target="#chat-messages"
            hx-swap="beforeend"
            hx-indicator="#typing"
            hx-encoding="multipart/form-data"
            class="d-flex flex-column gap-2">

        <input type="file" id="file-input" name="files" multiple
               accept=".pdf,.csv,.docx,.png,.jpg,.jpeg,.gif,.webp"
               style="display:none">

        <!-- File chips -->
        <div id="file-chips" class="d-flex flex-wrap gap-1" style="display:none;"></div>

        <!-- Message row -->
        <div class="d-flex gap-2 align-items-end">
          <textarea id="chat-input"
                    name="message"
                    class="form-control"
                    placeholder="Your answer... (or attach a file)"
                    autocomplete="off"
                    rows="3"
                    style="border-radius:8px; resize:none; overflow-y:hidden; min-height:72px; max-height:160px; line-height:1.5;"></textarea>
          <button type="button" id="attach-btn"
                  class="btn btn-outline-secondary px-3 flex-shrink-0"
                  style="border-radius:8px; height:44px; align-self:flex-end;"
                  title="Attach file">
            📎
          </button>
          <button type="submit" class="btn btn-dark px-4 flex-shrink-0"
                  style="border-radius:8px; height:44px; align-self:flex-end;">
            Send →
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({ breaks: true, gfm: true });

  function scrollToBottom() {
    const el = document.getElementById('chat-scroll');
    el.scrollTop = el.scrollHeight;
  }

  function renderMarkdown(container) {
    container.querySelectorAll('.chat-bubble-agent[data-markdown]').forEach(el => {
      el.innerHTML = marked.parse(el.dataset.markdown);
      delete el.dataset.markdown;
    });
  }

  // Attach button → trigger hidden file input
  document.getElementById('attach-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  // File selection → show chips
  document.getElementById('file-input').addEventListener('change', function () {
    const chips = document.getElementById('file-chips');
    chips.innerHTML = '';
    if (this.files.length > 0) {
      chips.style.display = 'flex';
      Array.from(this.files).forEach(f => {
        const chip = document.createElement('span');
        chip.className = 'badge bg-light text-dark border d-flex align-items-center gap-1';
        chip.style.cssText = 'font-size:0.78rem; padding:4px 8px; font-weight:normal;';
        chip.textContent = '📎 ' + f.name;
        chips.appendChild(chip);
      });
    } else {
      chips.style.display = 'none';
    }
  });

  // Show user bubble immediately on submit, before the request goes out
  document.getElementById('chat-form').addEventListener('submit', function(e) {
    const input = document.getElementById('chat-input');
    const fileInput = document.getElementById('file-input');
    const msg = input.value.trim();
    const files = Array.from(fileInput.files);

    if (!msg && files.length === 0) { e.preventDefault(); return; }

    let content = msg ? msg.replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
    if (files.length > 0) {
      const fileList = files.map(f => '📎 ' + f.name).join(' &middot; ');
      content += (content ? '<br><br>' : '') +
        '<span class="text-muted" style="font-size:0.78rem;">' + fileList + '</span>';
    }

    const bubble = document.createElement('div');
    bubble.className = 'd-flex mb-3 justify-content-end';
    bubble.innerHTML = `<div class="chat-bubble-user">${content}</div>`;
    document.getElementById('chat-messages').appendChild(bubble);

    requestAnimationFrame(() => {
      input.value = '';
      input.style.height = '72px';
      fileInput.value = '';
      const chips = document.getElementById('file-chips');
      chips.innerHTML = '';
      chips.style.display = 'none';
    });

    scrollToBottom();
  });

  // Render markdown + scroll after any htmx swap into the chat
  document.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'chat-messages') {
      renderMarkdown(e.detail.target);
      scrollToBottom();
    }
  });

  document.addEventListener('htmx:afterSettle', function(e) {
    renderMarkdown(document.getElementById('chat-messages'));
  });

  // Auto-grow textarea
  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = '72px';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
  });

  // Enter to submit, Shift+Enter for newline
  document.getElementById('chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('chat-form').requestSubmit();
    }
  });
</script>
{% endblock %}
