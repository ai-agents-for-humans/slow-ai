<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Run · {{ run_id }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; }
    .nav-link { border-radius: 0; }
    .nav-link.active { border-bottom: 2px solid #111; color: #111 !important; font-weight: 600; }
  </style>
</head>

<body class="d-flex flex-column" style="height:100vh; background:#f8f9fa;">

<!-- ── Status bar ────────────────────────────────────────────────────────── -->
<div id="status-bar"
     class="border-bottom bg-white px-4 py-2 d-flex align-items-center gap-3 flex-shrink-0">

  <a href="/" class="text-muted text-decoration-none flex-shrink-0" style="font-size:0.85rem;">← Back</a>

  <span id="status-badge" class="badge bg-secondary flex-shrink-0" style="font-size:0.7rem;">
    Initialising
  </span>

  <div class="text-muted text-truncate flex-grow-1" style="font-size:0.78rem; min-width:0;">
    {{ brief.get('goal', run_id) }}
  </div>

  <div id="activity-ticker"
       class="text-muted text-truncate flex-shrink-0"
       style="font-size:0.75rem; max-width:340px; font-style:italic; text-align:right;">
    Waiting for agents…
  </div>
</div>

<!-- ── Three columns ─────────────────────────────────────────────────────── -->
<div class="d-flex flex-grow-1 overflow-hidden">

  <!-- Col 1 — 10%: mini nav -->
  <div class="border-end bg-white d-flex flex-column flex-shrink-0"
       style="width:10%; overflow-y:auto;">

    <div class="px-3 py-3 border-bottom">
      <span class="fw-semibold" style="font-size:0.95rem; letter-spacing:-0.02em;">◈ Slow AI</span>
    </div>

    <div class="px-3 pt-3">
      <a href="/interview" class="btn btn-dark btn-sm w-100" style="font-size:0.75rem;">
        <i class="bi bi-plus-lg"></i> New
      </a>
    </div>

    <div class="px-3 pt-3 pb-1">
      <span class="text-uppercase text-muted fw-semibold"
            style="font-size:0.65rem; letter-spacing:0.08em;">Projects</span>
    </div>

    <div class="overflow-auto flex-grow-1 px-2 pb-3"
         id="project-list"
         hx-get="/api/projects-html"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="text-muted px-2 py-2" style="font-size:0.75rem;">Loading…</div>
    </div>
  </div>

  <!-- Col 2 — 50%: agent DAG + envelope drawer -->
  <div class="d-flex flex-column flex-shrink-0" style="width:50%;">

    <!-- Column header -->
    <div class="border-bottom border-end px-4 py-2 bg-white d-flex align-items-center justify-content-between flex-shrink-0">
      <div class="d-flex align-items-center gap-2">
        <span id="dag-col-title" class="fw-semibold" style="font-size:0.85rem;">Agent Swarm</span>
        <span class="text-muted" style="font-size:0.75rem;" id="dag-col-sub"></span>
      </div>
      <!-- Legend -->
      <div class="d-flex align-items-center gap-3" style="font-size:0.72rem; color:#6b7280;">
        <span><span class="d-inline-block rounded-circle me-1" style="width:8px;height:8px;background:#9ca3af;"></span>Waiting</span>
        <span><span class="d-inline-block rounded-circle me-1" style="width:8px;height:8px;background:#3b82f6;"></span>Running</span>
        <span><span class="d-inline-block rounded-circle me-1" style="width:8px;height:8px;background:#22c55e;"></span>Done</span>
        <span><span class="d-inline-block rounded-circle me-1" style="width:8px;height:8px;background:#ef4444;"></span>Failed</span>
        <span class="text-muted fst-italic">Click node to inspect</span>
      </div>
    </div>

    <!-- DAG canvas -->
    <div class="position-relative flex-grow-1" style="min-height:0;">
      <div id="cy" style="width:100%; height:100%; background:#fafafa;"></div>
    </div>

    <!-- Envelope drawer — hidden until a node is clicked -->
    <div id="envelope-drawer"
         class="border-top bg-white flex-shrink-0"
         style="display:none; height:340px; overflow-y:auto;">

      <div class="d-flex align-items-center justify-content-between px-4 py-2 border-bottom"
           style="position:sticky; top:0; background:#fff; z-index:5;">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <span class="fw-semibold" id="env-role" style="font-size:0.9rem;"></span>
          <span id="env-status-badge" class="badge" style="font-size:0.7rem;"></span>
          <span id="env-confidence" class="text-muted" style="font-size:0.78rem;"></span>
          <span id="env-duration" class="text-muted" style="font-size:0.78rem;"></span>
        </div>
        <button class="btn btn-sm btn-outline-secondary flex-shrink-0" style="font-size:0.75rem;"
                onclick="closeEnvelope()">✕</button>
      </div>

      <div class="px-4 py-3">
        <!-- Stats row -->
        <div class="d-flex gap-4 mb-3" style="font-size:0.8rem; color:#6b7280;">
          <span>Verdict: <strong id="env-verdict" class="text-dark"></strong></span>
          <span>Tokens: <strong id="env-tokens" class="text-dark"></strong></span>
          <span id="env-skills-wrap" style="display:none;">Skills: <strong id="env-skills" class="text-dark"></strong></span>
        </div>

        <!-- Proof -->
        <div class="mb-2 text-uppercase fw-semibold"
             style="font-size:0.68rem; letter-spacing:0.07em; color:#9ca3af;">Proof</div>
        <div id="env-proof"
             style="font-size:0.8rem; line-height:1.65; word-break:break-word;
                    white-space:pre-wrap; color:#374151;">
        </div>
      </div>
    </div>

  </div>

  <!-- Col 3 — 40%: info panel -->
  <div class="d-flex flex-column border-start bg-white flex-shrink-0" style="width:40%;">

    <!-- Tabs -->
    <div class="border-bottom px-3 pt-2 flex-shrink-0">
      <ul class="nav nav-tabs border-0" style="font-size:0.82rem;">
        <li class="nav-item">
          <button class="nav-link active px-3 py-2" data-tab="log"
                  onclick="switchTab('log',this)">Log</button>
        </li>
        <li class="nav-item">
          <button class="nav-link px-3 py-2" data-tab="phases"
                  onclick="switchTab('phases',this)">Phases</button>
        </li>
        <li class="nav-item">
          <button class="nav-link px-3 py-2" data-tab="plan"
                  onclick="switchTab('plan',this)">Plan</button>
        </li>
      </ul>
    </div>

    <!-- Log tab -->
    <div id="tab-log" class="flex-grow-1 overflow-auto p-3">
      <div id="log-lines"></div>
    </div>

    <!-- Phases tab -->
    <div id="tab-phases" class="flex-grow-1 overflow-auto p-3" style="display:none;">
      <div id="phase-cards"></div>
      <p id="phase-empty" class="text-muted small py-2 mb-0">
        Phase summaries appear here as each phase completes.
      </p>
    </div>

    <!-- Plan tab: context graph -->
    <div id="tab-plan" class="flex-grow-1" style="display:none; overflow:hidden; position:relative;">
      <div id="cy-plan" style="width:100%; height:100%;"></div>
      <p id="plan-empty" class="text-muted small px-3 py-3 mb-0 position-absolute top-0 start-0">
        Loading plan…
      </p>
    </div>

  </div>

</div><!-- /three columns -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script>
cytoscape.use(cytoscapeDagre);

const RUN_ID = "{{ run_id }}";

// ── Status badge ───────────────────────────────────────────────────────────

const _badgeClass = {
  initializing:            'bg-secondary',
  running:                 'bg-primary',
  completed:               'bg-success',
  failed:                  'bg-danger',
  waiting_for_human:       'bg-warning text-dark',
  blocked_on_capabilities: 'bg-warning text-dark',
};
const _badgeLabel = {
  initializing:            'Initialising',
  running:                 'Running',
  completed:               'Completed',
  failed:                  'Failed',
  waiting_for_human:       'Waiting',
  blocked_on_capabilities: 'Blocked',
};

function setStatus(status) {
  const b = document.getElementById('status-badge');
  b.className = 'badge flex-shrink-0 ' + (_badgeClass[status] || 'bg-secondary');
  b.textContent = _badgeLabel[status] || status;
}

// ── Tabs ───────────────────────────────────────────────────────────────────

function switchTab(tab, btn) {
  ['log', 'phases', 'plan'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.nav-link[data-tab]').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'plan' && cyPlan.elements().length) {
    setTimeout(() => cyPlan.fit(20), 60);
  }
}

// ── Log ───────────────────────────────────────────────────────────────────

const logEl  = document.getElementById('log-lines');
const logTab = document.getElementById('tab-log');

function appendLog(lines) {
  lines.forEach(msg => {
    const el = document.createElement('div');
    el.style.cssText = [
      'font-size:0.75rem',
      'font-family:monospace',
      'color:#374151',
      'padding:3px 0',
      'border-bottom:1px solid #f3f4f6',
      'word-break:break-word',
      'overflow-wrap:break-word',
      'white-space:pre-wrap',
    ].join(';');
    el.textContent = msg;
    logEl.appendChild(el);
    document.getElementById('activity-ticker').textContent = msg;
  });
  logTab.scrollTop = logTab.scrollHeight;
}

// ── Phase summaries ────────────────────────────────────────────────────────

const phaseCardsEl = document.getElementById('phase-cards');
const phaseEmptyEl = document.getElementById('phase-empty');
const _renderedPhases = new Set();

function renderPhaseSummaries(summaries) {
  if (!summaries || summaries.length === 0) return;
  phaseEmptyEl.style.display = 'none';
  summaries.forEach(s => {
    if (_renderedPhases.has(s.phase_id)) return;
    _renderedPhases.add(s.phase_id);

    // Mark phase node green on the plan graph
    const pn = cyPlan.getElementById(s.phase_id);
    if (pn.length) pn.style('background-color', '#22c55e');

    const conf = Math.round((s.mean_confidence || 0) * 100);
    const div = document.createElement('div');
    div.className = 'card mb-3 border-0 bg-light rounded-3';
    div.innerHTML = `
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div class="fw-semibold" style="font-size:0.88rem;">${s.phase_name}</div>
          <span class="badge bg-success ms-2 flex-shrink-0" style="font-size:0.7rem;">${conf}%</span>
        </div>
        <div class="text-muted" style="font-size:0.82rem; line-height:1.55; word-break:break-word;">
          ${s.synthesis || ''}
        </div>
        <div class="mt-2 text-muted" style="font-size:0.74rem;">
          ${(s.envelopes||[]).length} agents · ${(s.total_tokens||0).toLocaleString()} tokens
        </div>
      </div>`;
    phaseCardsEl.appendChild(div);
  });
}

// ── Agent DAG ─────────────────────────────────────────────────────────────

const _nodeColor = {
  registered: '#9ca3af',
  running:    '#3b82f6',
  completed:  '#22c55e',
  failed:     '#ef4444',
};

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: [],
  style: [
    {
      selector: 'node',
      style: {
        'background-color': '#9ca3af',
        'label': 'data(label)',
        'color': '#111',
        'font-size': '9px',
        'text-valign': 'bottom',
        'text-margin-y': '4px',
        'text-halign': 'center',
        'text-wrap': 'wrap',
        'text-max-width': '90px',
        'shape': 'ellipse',
        'width': '32px',
        'height': '32px',
      },
    },
    {
      selector: 'node[node_type="phase"]',
      style: {
        'shape': 'round-rectangle',
        'width': '130px',
        'height': '40px',
        'font-size': '9px',
        'font-weight': '600',
        'text-valign': 'center',
        'text-margin-y': 0,
        'background-color': '#374151',
        'color': '#fff',
      },
    },
    {
      selector: 'node[node_type="orchestrator"]',
      style: {
        'shape': 'diamond',
        'width': '38px',
        'height': '38px',
        'background-color': '#111',
        'color': '#111',
        'font-size': '8px',
      },
    },
    {
      selector: 'edge',
      style: {
        'line-color': '#d1d5db',
        'target-arrow-color': '#d1d5db',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'width': 1,
      },
    },
    {
      selector: 'node',
      style: { 'cursor': 'pointer' },
    },
  ],
  layout: { name: 'dagre', rankDir: 'TB', padding: 40, spacingFactor: 1.3 },
  userZoomingEnabled: true,
  userPanningEnabled: true,
});

function _label(n) {
  return (n.type || n.id || '')
    .replace(/_/g, ' ')
    .replace(/-[a-f0-9]{6}$/, '')
    .split(' ')
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join(' ');
}

function _nodeType(type) {
  if (type === 'orchestrator') return 'orchestrator';
  if (type && type.startsWith('phase_')) return 'phase';
  return 'specialist';
}

function _duration(n) {
  if (!n.spawned_at || !n.completed_at) return null;
  const secs = Math.round(
    (new Date(n.completed_at) - new Date(n.spawned_at)) / 1000
  );
  return secs >= 60
    ? `${Math.floor(secs/60)}m ${secs%60}s`
    : `${secs}s`;
}

function _subLabel(n) {
  const parts = [];
  if (n.status === 'completed' || n.status === 'failed') {
    const d = _duration(n);
    if (d) parts.push(d);
  }
  if (n.tokens) parts.push(n.tokens.toLocaleString() + ' tok');
  return parts.join(' · ');
}

function _nodeLabel(n) {
  const main = _label(n);
  const sub = _subLabel(n);
  return sub ? `${main}\n${sub}` : main;
}

function updateDag(dag) {
  if (!dag || !dag.nodes) return;
  let changed = false;
  dag.nodes.forEach(n => {
    const color = _nodeColor[n.status] || '#9ca3af';
    const existing = cy.getElementById(n.id);
    if (existing.length) {
      if (existing.data('status') !== n.status) {
        existing.data('status', n.status);
        existing.data('completed_at', n.completed_at);
        existing.data('tokens', n.tokens);
        existing.data('label', _nodeLabel(n));
        existing.style('background-color', color);
        changed = true;
      }
    } else {
      cy.add({
        data: { id: n.id, label: _nodeLabel(n), node_type: _nodeType(n.type),
                status: n.status, tokens: n.tokens,
                spawned_at: n.spawned_at, completed_at: n.completed_at,
                work_item_id: n.work_item_id },
        style: { 'background-color': color },
      });
      changed = true;
    }
  });
  dag.edges.forEach(e => {
    const eid = `${e.source}__${e.target}`;
    if (!cy.getElementById(eid).length) {
      cy.add({ data: { id: eid, source: e.source, target: e.target } });
      changed = true;
    }
  });
  if (changed) {
    cy.layout({ name: 'dagre', rankDir: 'TB', padding: 40, spacingFactor: 1.3 }).run();
    cy.fit(40);
    // Update column sub-title with live counts
    const total = dag.nodes.length;
    const done  = dag.nodes.filter(n => n.status === 'completed').length;
    const run   = dag.nodes.filter(n => n.status === 'running').length;
    document.getElementById('dag-col-sub').textContent =
      run > 0 ? `${run} running · ${done}/${total} done` : `${done}/${total} done`;
  }
}

// ── Envelope drawer ────────────────────────────────────────────────────────

const drawer = document.getElementById('envelope-drawer');

function closeEnvelope() {
  drawer.style.display = 'none';
}

function _proofText(proof) {
  if (!proof) return '—';
  return Object.entries(proof)
    .map(([k, v]) => {
      const val = typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v);
      return `[${k}]\n${val}`;
    })
    .join('\n\n');
}

cy.on('tap', 'node', async function(e) {
  const n = e.target;
  const agentId = n.data('id');
  const status = n.data('status') || 'unknown';
  const dur = _duration(n.data());

  // Populate immediately from DAG data
  document.getElementById('env-role').textContent = _label(n.data());
  document.getElementById('env-status-badge').textContent = status;
  document.getElementById('env-status-badge').style.background = _nodeColor[status] || '#9ca3af';
  document.getElementById('env-confidence').textContent = '';
  document.getElementById('env-duration').textContent = dur ? `· ${dur}` : '';
  document.getElementById('env-verdict').textContent = '…';
  document.getElementById('env-tokens').textContent = n.data('tokens')
    ? Number(n.data('tokens')).toLocaleString() : '…';
  document.getElementById('env-skills-wrap').style.display = 'none';
  document.getElementById('env-proof').textContent = 'Loading…';
  drawer.style.display = 'block';

  // Look up required_skills from the plan graph via work_item_id
  const workItemId = n.data('work_item_id');
  if (workItemId) {
    const wi = cyPlan.getElementById(workItemId);
    if (wi.length && wi.data('skills')) {
      document.getElementById('env-skills').textContent = wi.data('skills');
      document.getElementById('env-skills-wrap').style.display = '';
    }
  }

  // Fetch full envelope
  try {
    const res = await fetch(`/api/runs/${RUN_ID}/agent/${agentId}`);
    if (!res.ok) {
      document.getElementById('env-proof').textContent =
        (status === 'registered' || status === 'running')
          ? 'Agent has not completed yet.'
          : 'No envelope available.';
      return;
    }
    const env = await res.json();
    if (env.confidence != null)
      document.getElementById('env-confidence').textContent =
        `· ${Math.round(env.confidence * 100)}% confidence`;
    document.getElementById('env-verdict').textContent = env.verdict || '—';
    document.getElementById('env-tokens').textContent =
      env.cost_tokens != null ? env.cost_tokens.toLocaleString() : '—';
    document.getElementById('env-proof').textContent = _proofText(env.proof);
  } catch(_) {
    document.getElementById('env-proof').textContent = 'Could not load envelope.';
  }
});

cy.on('tap', e => { if (e.target === cy) closeEnvelope(); });

// ── Plan graph ─────────────────────────────────────────────────────────────

const cyPlan = cytoscape({
  container: document.getElementById('cy-plan'),
  elements: [],
  style: [
    {
      selector: '.phase-node',
      style: {
        'background-color': '#374151',
        'label': 'data(label)',
        'color': '#fff',
        'font-size': '10px',
        'font-weight': '600',
        'text-valign': 'center',
        'text-halign': 'center',
        'shape': 'round-rectangle',
        'width': '120px',
        'height': '40px',
        'text-wrap': 'wrap',
        'text-max-width': '108px',
      },
    },
    {
      selector: '.work-item-node',
      style: {
        'background-color': '#fff',
        'border-color': '#d1d5db',
        'border-width': '1px',
        'label': 'data(label)',
        'color': '#111',
        'font-size': '9px',
        'text-valign': 'center',
        'text-halign': 'center',
        'shape': 'round-rectangle',
        'width': '110px',
        'height': '36px',
        'text-wrap': 'wrap',
        'text-max-width': '98px',
      },
    },
    {
      selector: 'edge',
      style: {
        'line-color': '#d1d5db',
        'target-arrow-color': '#d1d5db',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'width': 1,
        'opacity': 0.7,
      },
    },
  ],
  layout: { name: 'dagre', rankDir: 'LR', padding: 20, spacingFactor: 1.1 },
  userZoomingEnabled: true,
  userPanningEnabled: true,
});

async function loadPlanGraph() {
  try {
    const res = await fetch(`/api/runs/${RUN_ID}/context-graph`);
    if (!res.ok) return;
    const data = await res.json();
    if (!data.nodes || !data.nodes.length) return;
    document.getElementById('plan-empty').style.display = 'none';
    data.nodes.forEach(n => {
      cyPlan.add({
        data: { id: n.id, label: n.name, description: n.description },
        classes: n.node_type === 'phase' ? 'phase-node' : 'work-item-node',
      });
    });
    data.edges.forEach(e => {
      cyPlan.add({ data: { source: e.source, target: e.target } });
    });
    cyPlan.layout({ name: 'dagre', rankDir: 'LR', padding: 20, spacingFactor: 1.1 }).run();
    cyPlan.fit(20);
  } catch(_) {}
}

// ── SSE with auto-reconnect ────────────────────────────────────────────────

let _terminal = false;

function connectSSE() {
  const es = new EventSource(`/api/runs/${RUN_ID}/stream`);
  es.onmessage = function(e) {
    const state = JSON.parse(e.data);
    setStatus(state.status);
    if (state.new_log && state.new_log.length) appendLog(state.new_log);
    if (state.dag) updateDag(state.dag);
    if (state.phase_summaries) renderPhaseSummaries(state.phase_summaries);
    if (['completed', 'failed'].includes(state.status)) {
      _terminal = true;
      es.close();
      if (state.status === 'completed') {
        document.getElementById('activity-ticker').textContent = 'Complete — loading results…';
        setTimeout(() => { window.location.href = `/run/${RUN_ID}/results`; }, 1200);
      } else {
        document.getElementById('activity-ticker').textContent = 'Run failed.';
      }
    }
  };
  es.onerror = function() {
    es.close();
    if (!_terminal) {
      setTimeout(connectSSE, 4000);
      document.getElementById('activity-ticker').textContent = 'Reconnecting…';
    }
  };
}

loadPlanGraph();
connectSSE();
</script>
</body>
</html>
