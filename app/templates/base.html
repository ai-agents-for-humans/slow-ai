<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Slow AI{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="/static/css/app.css">

  {% block head %}{% endblock %}
</head>
<body class="d-flex" x-data>

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <nav id="sidebar" class="d-flex flex-column flex-shrink-0 border-end bg-white"
       style="width:260px; min-height:100vh;">

    <!-- Logo -->
    <div class="px-3 py-4 border-bottom">
      <span class="fw-semibold text-dark" style="letter-spacing:-0.02em; font-size:1.1rem;">
        ◈ Slow AI
      </span>
    </div>

    <!-- New Investigation -->
    <div class="px-3 pt-3 pb-2">
      <a href="/interview" class="btn btn-dark w-100 btn-sm d-flex align-items-center gap-2">
        <i class="bi bi-plus-lg"></i> New Investigation
      </a>
    </div>

    <!-- Projects -->
    <div class="px-3 pt-2 pb-1">
      <span class="text-uppercase text-muted fw-semibold" style="font-size:0.7rem; letter-spacing:0.08em;">
        Projects
      </span>
    </div>

    <div class="overflow-auto flex-grow-1 px-2 pb-3"
         id="project-list"
         hx-get="/api/projects-html"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="text-muted small px-2 py-2">Loading...</div>
    </div>

  </nav>

  <!-- ── Main content ────────────────────────────────────────────────── -->
  <main class="flex-grow-1" style="background:#f8f9fa; min-height:100vh;">
    {% block content %}{% endblock %}
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
