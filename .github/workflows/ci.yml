name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check src/ app/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ app/

      - name: Type check (mypy)
        run: uv run mypy src/ app/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    env:
      GEMINI_KEY_SLOW_AI: ${{ secrets.GEMINI_KEY_SLOW_AI }}
      PERPLEXITY_KEY_SLOW_AI: ${{ secrets.PERPLEXITY_KEY_SLOW_AI }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest --tb=short -q
